name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: launchstack
          POSTGRES_PASSWORD: launchstack
          POSTGRES_DB: launchstack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U launchstack -d launchstack_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://launchstack:launchstack@localhost:5432/launchstack_test?schema=public
      JWT_ACCESS_SECRET: test-access-secret-that-is-long-enough-123
      JWT_REFRESH_SECRET: test-refresh-secret-that-is-long-enough-123
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
